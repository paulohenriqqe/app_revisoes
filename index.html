<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As Minhas Revisões</title>
    <style>
        :root { --bg: #f3f4f6; --card: #ffffff; --primary: #3b82f6; --text: #1f2937; --success: #10b981; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 80px; }
        header { background: var(--card); padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; }
        h1 { margin: 0; font-size: 1.5rem; }
        .filtros { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; padding-bottom: 5px; }
        .btn-filtro { padding: 8px 16px; border-radius: 20px; border: none; background: #e5e7eb; color: var(--text); font-weight: bold; white-space: nowrap; cursor: pointer; }
        .btn-filtro.ativo { background: var(--primary); color: white; }
        .container { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .info { display: flex; justify-content: space-between; font-size: 0.9rem; color: #6b7280; margin-bottom: 10px; }
        .status-pendente { color: #ef4444; font-weight: bold; }
        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; border: none; }
        /* Modal Novo Conteúdo */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 20; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 85%; max-width: 400px; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        .btn-salvar { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; }
        #loading { text-align: center; margin-top: 50px; font-weight: bold; color: #6b7280; }
    </style>
</head>
<body>

    <header>
        <h1>📚 Revisões</h1>
    </header>

    <div class="filtros">
        <button class="btn-filtro ativo" onclick="filtrar('hoje')">🔥 Para Hoje</button>
        <button class="btn-filtro" onclick="filtrar('todas')">Todas as Pendentes</button>
    </div>

    <div id="loading">A carregar dados do Google Sheets... ⏳</div>
    <div class="container" id="lista-cards"></div>

    <button class="fab" onclick="abrirModal()">+</button>

    <div class="modal" id="modalNovo">
        <div class="modal-content">
            <h2 style="margin-top:0;">Novo Estudo</h2>
            <label>O que estudaste?</label>
            <input type="text" id="nomeConteudo" placeholder="Ex: Microeconomia">
            <label>Data</label>
            <input type="date" id="dataEstudo">
            <button class="btn-salvar" onclick="salvarConteudo()">Guardar</button>
            <button onclick="fecharModal()" style="width:100%; padding:10px; margin-top:10px; background:none; border:none; color:#6b7280;">Cancelar</button>
        </div>
    </div>

    <script>
        // 🚨 COLA O TEU LINK GIGANTE AQUI ENTRE AS ASPAS 🚨
        const API_URL = "https://script.google.com/macros/s/AKfycbx0giuM53xhBwSTGu3A686KDcKOHSy-R1FUHuAPStAsau5rZOdzxHA5eSFpbeiEK90BXg/exec";
        
        let dadosGlobais = [];

        // Inicia ao carregar a página
        window.onload = () => buscarDados();

        async function buscarDados() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('lista-cards').innerHTML = '';
            
            const resposta = await fetch(API_URL);
            dadosGlobais = await resposta.json();
            
            document.getElementById('loading').style.display = 'none';
            filtrar('hoje'); // Mostra "hoje" por defeito
        }

        function renderizarCards(dados) {
            const container = document.getElementById('lista-cards');
            container.innerHTML = '';
            
            if(dados.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Tudo em dia! 🎉</div>';
                return;
            }

            dados.forEach(item => {
                // Aqui podemos adicionar a lógica para mostrar qual revisão está pendente
                // Para simplificar a interface, mostramos o card básico
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h2>${item['📚 CONTEÚDO'] || item.Conteudo}</h2>
                    <div class="info">
                        <span>Progresso: ${item['📊 PROGRESSO'] || item.Progresso || '0/4'}</span>
                        <span class="status-pendente">⚠️ Pendente</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filtrar(tipo) {
            // Atualiza botões
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
            event.target.classList.add('ativo');

            let filtrados = [];
            const hoje = new Date().toISOString().split('T')[0];

            if (tipo === 'todas') {
                filtrados = dadosGlobais;
            } else if (tipo === 'hoje') {
                // Lógica simples para exemplificar: puxar tudo o que não está concluído
                filtrados = dadosGlobais.slice(0, 10); // Exemplo provisório
            }
            renderizarCards(filtrados);
        }

        // Funções do Modal de Adicionar
        function abrirModal() { document.getElementById('modalNovo').style.display = 'flex'; }
        function fecharModal() { document.getElementById('modalNovo').style.display = 'none'; }

        async function salvarConteudo() {
            const nome = document.getElementById('nomeConteudo').value;
            const data = document.getElementById('dataEstudo').value;
            
            if(!nome || !data) return alert("Preenche tudo!");

            document.querySelector('.btn-salvar').innerText = "A guardar...";
            
            // Envia para o Apps Script
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: "adicionar", nome: nome, data: data })
            });

            document.querySelector('.btn-salvar').innerText = "Guardar";
            fecharModal();
            document.getElementById('nomeConteudo').value = '';
            buscarDados(); // Atualiza a lista
        }
    </script>
</body>
</html>
