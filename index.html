<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revisões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f5f3ee;
      --white:     #ffffff;
      --surface:   #faf9f6;
      --border:    #e8e4dc;
      --text:      #1c1917;
      --muted:     #9c9488;
      --accent:    #2d6a4f;
      --accent-lt: #e8f5ee;
      --red:       #c0392b;
      --red-lt:    #fdecea;
      --amber:     #b45309;
      --amber-lt:  #fef3c7;
      --blue:      #1d4ed8;
      --radius:    12px;
      --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --crimson:   #dc143c; /* Nova cor para Int/Fin */
      --crimson-lt:#fae6ea;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding-bottom: 110px;
    }

    header {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 16px 20px 0; position: sticky; top: 0; z-index: 10;
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 800; }

    .sync-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-size: 17px;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .sync-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .sync-btn.spinning { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .stat-n { font-family: 'Playfair Display', serif; font-size: 1.65rem; font-weight: 700; line-height: 1; }
    .stat-n.red   { color: var(--red); }
    .stat-n.blue  { color: var(--blue); }
    .stat-n.green { color: var(--accent); }
    .stat-lbl { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-top: 3px; }

    .filtros { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
    .filtros::-webkit-scrollbar { display: none; }
    .pill {
      padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border);
      background: transparent; color: var(--muted); font-family: 'Nunito', sans-serif;
      font-weight: 700; font-size: 0.78rem; white-space: nowrap; cursor: pointer; transition: all 0.18s;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.ativo { background: var(--accent); border-color: var(--accent); color: #fff; }

    .sub-filtros { display: none; gap: 6px; overflow-x: auto; padding-bottom: 14px; margin-top: -4px; scrollbar-width: none; }
    .sub-filtros::-webkit-scrollbar { display: none; }
    .sub-filtros.show { display: flex; }
    
    /* Toggle buttons p/ múltipla escolha */
    .sub-pill {
      padding: 4px 12px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--muted); font-size: 0.72rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: 0.2s; opacity: 0.6;
    }
    .sub-pill.ativo { opacity: 1; border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    .lista { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden; animation: up 0.28s ease both;
    }
    @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .card-inner { display: flex; align-items: stretch; }
    .stripe { width: 4px; flex-shrink: 0; background: var(--border); }
    .card.urgente .stripe { background: var(--red); }
    .card.hoje    .stripe { background: var(--amber); }
    .card.ok      .stripe { background: var(--accent); }

    .card-body { flex: 1; padding: 13px 14px 12px; min-width: 0; }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;}
    .card-titulo {
      font-family: 'Playfair Display', serif; font-size: 0.98rem; font-weight: 700;
      color: var(--text); line-height: 1.35; word-break: break-word; margin: 0;
    }
    .btn-edit { background: none; border: none; font-size: 1.05rem; cursor: pointer; opacity: 0.4; transition: 0.2s; padding: 0 0 0 8px; }
    .btn-edit:hover { opacity: 1; transform: scale(1.1); }

    .card-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
    .bg-gray  { background: #f0ede8; color: var(--muted); }
    .bg-red   { background: var(--red-lt);    color: var(--red); }
    .bg-amber { background: var(--amber-lt);  color: var(--amber); }
    .bg-green { background: var(--accent-lt); color: var(--accent); }

    .etapas { display: flex; flex-wrap: wrap; gap: 5px; }

    .etapa {
      font-size: 0.71rem; font-weight: 700; font-family: 'Nunito', sans-serif;
      padding: 4px 10px; border-radius: 7px;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all 0.18s; line-height: 1.4;
      position: relative;
    }
    .etapa:not(.feito):hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }

    /* Estilos base para estados */
    .etapa.pend-hoje  { border-color: #fbbf24; background: var(--amber-lt); color: var(--amber); }
    .etapa.atrasado   { border-color: #fca5a5; background: var(--red-lt);   color: var(--red); }

    .etapa.feito { border-color: #bbf7d0; background: var(--accent-lt); color: var(--accent); cursor: pointer; }
    
    /* Nova Regra: Estilo Feito p/ Etapas Especiais (Int/Fin) -> Vermelho */
    .etapa.especial:not(.feito):hover { border-color: var(--crimson); color: var(--crimson); background: var(--crimson-lt); }
    .etapa.especial.feito { border-color: #fca5a5; background: var(--crimson-lt); color: var(--crimson); }
    
    .etapa.feito .txt-normal  { display: inline; }
    .etapa.feito .txt-desfazer { display: none; }
    
    /* Hover desfazer base */
    .etapa.feito:hover { border-color: var(--red); background: var(--red-lt); color: var(--red); }
    .etapa.feito:hover .txt-normal  { display: none; }
    .etapa.feito:hover .txt-desfazer { display: inline; }
    /* Hover desfazer p/ especial */
    .etapa.especial.feito:hover { border-color: var(--text); background: var(--border); color: var(--text); }

    .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.6rem; margin-bottom: 10px; }
    .empty-txt  { font-size: 0.88rem; line-height: 1.7; }

    .skel { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .skel-line { border-radius: 6px; background: linear-gradient(90deg, #ede9e2 25%, #f5f3ee 50%, #ede9e2 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .fab {
      position: fixed; bottom: 24px; right: 20px; width: 52px; height: 52px;
      background: var(--accent); color: white; border-radius: 50%; border: none;
      font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(45,106,79,0.32); transition: transform 0.2s, box-shadow 0.2s; z-index: 15;
    }
    .fab:hover  { transform: scale(1.08); box-shadow: 0 10px 28px rgba(45,106,79,0.42); }
    .fab:active { transform: scale(0.94); }

    .toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--text); color: #fff; padding: 9px 20px; border-radius: 30px;
      font-size: 0.83rem; font-weight: 600; opacity: 0; pointer-events: none;
      transition: all 0.25s; z-index: 50; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(28,25,23,0.4); backdrop-filter: blur(3px);
      z-index: 20; align-items: flex-end; justify-content: center;
    }
    .overlay.show { display: flex; }
    .sheet {
      background: var(--white); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border);
      padding: 20px 20px 44px; width: 100%; max-width: 500px; animation: slideUp 0.28s ease;
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .handle { width: 36px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 20px; }
    .sheet h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 800; margin-bottom: 18px; }

    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
      border-radius: 10px; background: var(--surface); color: var(--text);
      font-size: 0.93rem; font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); background: var(--white); }
    .grid-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }

    .preview-box {
      background: var(--accent-lt); border: 1px solid #b7e4c7; border-radius: 10px;
      padding: 11px 14px; font-size: 0.8rem; color: var(--accent); font-weight: 600;
      margin-top: 10px; display: none; line-height: 2;
    }
    .preview-box .lbl { opacity: 0.6; font-weight: 500; }

    .btn-save {
      width: 100%; padding: 13px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 16px; transition: all 0.2s;
    }
    .btn-save:hover    { background: #235e45; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-cancel { width: 100%; padding: 11px; background: none; border: none; color: var(--muted); font-size: 0.87rem; font-weight: 600; cursor: pointer; margin-top: 6px; }
    
    .btn-delete { width: 100%; padding: 11px; background: none; border: 1.5px solid var(--red); color: var(--red); border-radius: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
    .btn-delete:hover { background: var(--red-lt); }

    #debugBox { display: none; margin: 10px 16px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 12px; font-size: 0.78rem; color: #7d4e00; }
  </style>
</head>
<body>

  <header>
    <div class="header-row">
      <h1>📚 Revisões</h1>
      <button class="sync-btn" id="syncBtn" onclick="sincronizar()" title="Atualizar">↻</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n red"   id="numHoje">–</div><div class="stat-lbl">Para hoje</div></div>
      <div class="stat"><div class="stat-n blue"  id="numTotal">–</div><div class="stat-lbl">Conteúdos</div></div>
      <div class="stat"><div class="stat-n green" id="numOk">–</div><div class="stat-lbl">Completos</div></div>
    </div>
    <div class="filtros">
      <button class="pill ativo" onclick="filtrar(this,'hoje')">🔥 Hoje</button>
      <button class="pill" onclick="filtrar(this,'atrasados')">⚠️ Atrasados</button>
      <button class="pill" onclick="filtrar(this,'proximos')">📅 Próximos 7d</button>
      <button class="pill" onclick="filtrar(this,'intermediaria')">🔄 Intermediária</button>
      <button class="pill" onclick="filtrar(this,'final')">🏆 Final</button>
      <button class="pill" onclick="filtrar(this,'todos')">Todos</button>
    </div>
    
    <div class="sub-filtros" id="subFiltros">
      <button class="sub-pill ativo" id="btnFaltaRev" onclick="toggleFiltro('falta_revisar')">⏳ Falta Revisar</button>
      <button class="sub-pill" id="btnJaRev" onclick="toggleFiltro('ja_revisado')">✅ Já Revisado</button>
    </div>
  </header>

  <div id="debugBox"></div>
  <div class="lista" id="lista"></div>
  <div class="toast" id="toast"></div>
  <button class="fab" onclick="abrirSheet()">+</button>

  <div class="overlay" id="overlay" onclick="fecharBg(event)">
    <div class="sheet">
      <div class="handle"></div>
      <h2>Novo estudo</h2>
      <div class="field">
        <label>O que estudou?</label>
        <input id="inpNome" type="text" placeholder="Ex: Termodinâmica — Cap. 4" />
      </div>
      <div class="field">
        <label>Data do estudo</label>
        <input id="inpData" type="date" />
      </div>
      <div class="preview-box" id="previewBox">
        Revisões agendadas:<br/>
        <span class="lbl">R1 →</span> <strong id="p1"></strong> &nbsp;
        <span class="lbl">R2 →</span> <strong id="p2"></strong><br/>
        <span class="lbl">R3 →</span> <strong id="p3"></strong> &nbsp;
        <span class="lbl">R4 →</span> <strong id="p4"></strong>
      </div>
      <button class="btn-save" id="btnSalvar" onclick="salvar()">Salvar</button>
      <button class="btn-cancel" onclick="fecharSheet()">Cancelar</button>
    </div>
  </div>

  <div class="overlay" id="overlayEdit" onclick="fecharBgEdit(event)">
    <div class="sheet">
      <div class="handle"></div>
      <h2>Editar Conteúdo</h2>
      <input type="hidden" id="editId" />
      
      <div class="field">
        <label>Nome do Estudo</label>
        <input id="editNome" type="text" />
      </div>
      
      <div class="grid-dates">
        <div class="field"><label>Data Início</label><input id="editDataIni" type="date"/></div>
        <div class="field"><label>Rev 1</label><input id="editD1" type="date"/></div>
        <div class="field"><label>Rev 2</label><input id="editD2" type="date"/></div>
        <div class="field"><label>Rev 3</label><input id="editD3" type="date"/></div>
        <div class="field"><label>Rev 4</label><input id="editD4" type="date"/></div>
      </div>

      <button class="btn-save" id="btnSalvarEdit" onclick="salvarEditar()">Salvar Alterações</button>
      <button class="btn-delete" onclick="excluirAssunto()">🗑️ Excluir Assunto</button>
      <button class="btn-cancel" onclick="fecharSheetEdit()">Cancelar</button>
    </div>
  </div>

  <script>
    const API_URL   = "https://script.google.com/macros/s/AKfycbx0giuM53xhBwSTGu3A686KDcKOHSy-R1FUHuAPStAsau5rZOdzxHA5eSFpbeiEK90BXg/exec";
    const CACHE_KEY = "rev_cache_v8";
    const CACHE_TTL = 5 * 60 * 1000;
    const LABELS    = ['R1','R2','R3','R4', 'R. Int', 'R. Fin'];

    let dados = [];
    let filtroAtual = 'hoje';
    
    // Estado dos Toggles (Inicia com "Falta Revisar" ativo)
    let statesSubFiltro = {
      falta_revisar: true,
      ja_revisado: false
    };

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('inpData').value = hojeISO();
      document.getElementById('inpData').addEventListener('change', mostrarPreview);
      document.getElementById('inpNome').addEventListener('input',  mostrarPreview);
      const cached = lerCache();
      if (cached) { dados = cached; atualizar(); }
      buscarDados(!!cached);
    });

    function lerCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const { ts, data } = JSON.parse(raw);
        return Date.now() - ts > CACHE_TTL ? null : data;
      } catch { return null; }
    }
    function salvarCache(data) {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
    }

    async function buscarDados(silencioso = false) {
      const btn = document.getElementById('syncBtn');
      btn.classList.add('spinning');
      if (!silencioso) renderSkeleton();
      try {
        const res = await fetch(API_URL + "?t=" + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const raw = await res.json();
        if (raw && raw.erro) { mostrarDebug('Erro do servidor: ' + raw.erro); return; }
        dados = normalizar(raw);
        salvarCache(dados);
        atualizar();
        if (!silencioso) toast("✅ Dados atualizados!");
      } catch (err) {
        if (!silencioso) toast("⚠️ Erro ao carregar");
        mostrarDebug('Erro: ' + err.message);
        if (dados.length === 0) renderErro();
      } finally {
        btn.classList.remove('spinning');
      }
    }

    function sincronizar() { buscarDados(false); }

    function normalizar(raw) {
      return raw.map(row => ({
        id:      String(row.id || row.ID || ''),
        nome:    String(row.Conteudo || ''),
        prog:    String(row.Status || '0/4'), // Max 4
        dataIni: parseData(row.Data_Ini),
        rev: [
          { data: parseData(row.Data_Rev1), status: String(row.Status_Rev1 || 'Pendente') },
          { data: parseData(row.Data_Rev2), status: String(row.Status_Rev2 || 'Pendente') },
          { data: parseData(row.Data_Rev3), status: String(row.Status_Rev3 || 'Pendente') },
          { data: parseData(row.Data_Rev4), status: String(row.Status_Rev4 || 'Pendente') },
          { data: null, status: String(row.Status_RevInt || 'Pendente') },
          { data: null, status: String(row.Status_RevFinal || 'Pendente') }
        ]
      })).filter(r => r.nome && r.id);
    }

    function hojeISO() { return new Date().toISOString().split('T')[0]; }

    function parseData(v) {
      if (!v) return null;
      if (v instanceof Date) return isNaN(v) ? null : v;
      const s = String(v).trim();
      if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
        const [dd, mm, yyyy] = s.split('/');
        return new Date(yyyy + '-' + mm + '-' + dd + 'T12:00:00');
      }
      const d = new Date(s.length === 10 ? s + 'T12:00:00' : s);
      return isNaN(d) ? null : d;
    }

    function toISO(d)    { return d ? d.toISOString().split('T')[0] : ''; }
    function fmt(d)      { return d ? d.toLocaleDateString('pt-PT', { day:'2-digit', month:'2-digit' }) : ''; }
    function addDias(b,n){ const d = new Date(b); d.setDate(d.getDate() + n); return d; }
    function isHoje(d)   { return d ? toISO(d) === hojeISO() : false; }
    function isAtrasado(d){ return d ? toISO(d) < hojeISO()  : false; }
    function emDias(d,n) {
      if (!d) return false;
      const lim = addDias(new Date(), n);
      return toISO(d) > hojeISO() && toISO(d) <= toISO(lim);
    }

    function isR4Completo(item) {
      return item.rev.slice(0, 4).every(r => r.status === 'Feito');
    }

    function estado(item) {
      const pend = item.rev.slice(0, 4).filter(r => r.status !== 'Feito');
      return {
        atrasado: item.rev.slice(0,4).some(r => r.status !== 'Feito' && isAtrasado(r.data)),
        hoje:     item.rev.slice(0,4).some(r => r.status !== 'Feito' && isHoje(r.data)),
        completo: pend.length === 0
      };
    }

    function filtrar(el, tipo) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('ativo'));
      el.classList.add('ativo');
      filtroAtual = tipo;
      
      const sub = document.getElementById('subFiltros');
      if (tipo === 'intermediaria' || tipo === 'final') {
        sub.classList.add('show');
      } else {
        sub.classList.remove('show');
      }
      renderCards();
    }

    // Toggle: Liga/desliga botão e força render
    function toggleFiltro(tipo) {
      statesSubFiltro[tipo] = !statesSubFiltro[tipo]; // inverte estado
      
      const btnFalta = document.getElementById('btnFaltaRev');
      const btnJa    = document.getElementById('btnJaRev');
      
      if(statesSubFiltro.falta_revisar) btnFalta.classList.add('ativo'); else btnFalta.classList.remove('ativo');
      if(statesSubFiltro.ja_revisado)   btnJa.classList.add('ativo');    else btnJa.classList.remove('ativo');
      
      renderCards();
    }

    function aplicarFiltro(lista) {
      if (filtroAtual === 'intermediaria' || filtroAtual === 'final') {
        const isFinal = filtroAtual === 'final';
        const revIndex = isFinal ? 5 : 4;

        return lista.filter(item => {
          const r4Ok = isR4Completo(item);
          if (!r4Ok) return false; // Se não fez as 4, não entra aqui
          
          const isPendenteAtual = item.rev[revIndex].status !== 'Feito';
          
          // Se nenhum botão está ligado, não mostra nada
          if (!statesSubFiltro.falta_revisar && !statesSubFiltro.ja_revisado) return false;
          // Se os dois estão ligados, mostra tudo dessa aba
          if (statesSubFiltro.falta_revisar && statesSubFiltro.ja_revisado) return true;
          
          // Se só um está ligado
          if (statesSubFiltro.falta_revisar) return isPendenteAtual;
          if (statesSubFiltro.ja_revisado) return !isPendenteAtual;
        });
      }

      switch (filtroAtual) {
        case 'hoje':      return lista.filter(i => { const e = estado(i); return e.hoje || e.atrasado; });
        case 'atrasados': return lista.filter(i => estado(i).atrasado);
        case 'proximos':  return lista.filter(i => i.rev.some(r => r.data && r.status !== 'Feito' && emDias(r.data, 7)));
        default:          return lista;
      }
    }

    function atualizar() {
      const comHoje   = dados.filter(i => { const e = estado(i); return e.hoje || e.atrasado; });
      const completos = dados.filter(i => estado(i).completo);
      document.getElementById('numHoje').textContent  = comHoje.length;
      document.getElementById('numTotal').textContent = dados.length;
      document.getElementById('numOk').textContent    = completos.length;
      renderCards();
    }

    function renderCards() {
      const lista = aplicarFiltro(dados);
      const el    = document.getElementById('lista');

      if (lista.length === 0) {
        el.innerHTML = `
          <div class="empty">
            <div class="empty-icon">${filtroAtual === 'hoje' ? '🎉' : '🔍'}</div>
            <div class="empty-txt">${filtroAtual === 'hoje' ? 'Tudo em dia!<br/>Nada para rever hoje.' : 'Nenhum conteúdo.'}</div>
          </div>`;
        return;
      }

      el.innerHTML = '';
      lista.forEach((item, idx) => {
        const { atrasado, hoje, completo } = estado(item);
        const cls = completo ? 'ok' : atrasado ? 'urgente' : hoje ? 'hoje' : '';

        const etapasHTML = item.rev.map((r, i) => {
          const feito = r.status === 'Feito';
          const isEspecial = (i === 4 || i === 5);
          
          const phoje = !isEspecial && !feito && r.data && isHoje(r.data);
          const patr  = !isEspecial && !feito && r.data && isAtrasado(r.data);
          
          // Atribui classes (incluindo "especial" para cor vermelha)
          let ecls = '';
          if (feito) ecls += 'feito ';
          if (isEspecial) ecls += 'especial ';
          if (phoje) ecls += 'pend-hoje ';
          if (patr)  ecls += 'atrasado ';
          
          const labelCompleta = isEspecial ? LABELS[i] : `${LABELS[i]} · ${fmt(r.data)}`;

          if (feito) {
            return `<button class="etapa ${ecls.trim()}" onclick="desfazerRevisao('${item.id}',${i})">
              <span class="txt-normal">✓ ${LABELS[i]}</span>
              <span class="txt-desfazer">↩ Desfazer?</span>
            </button>`;
          } else {
            return `<button class="etapa ${ecls.trim()}" onclick="marcarFeito('${item.id}',${i})">${labelCompleta}</button>`;
          }
        }).join('');

        const card = document.createElement('div');
        card.className = `card ${cls}`;
        card.style.animationDelay = (idx * 35) + 'ms';
        card.innerHTML = `
          <div class="card-inner">
            <div class="stripe"></div>
            <div class="card-body">
              <div class="card-header">
                 <h3 class="card-titulo">${item.nome}</h3>
                 <button class="btn-edit" onclick="abrirEditar('${item.id}')" title="Editar">✏️</button>
              </div>
              <div class="card-badges">
                <span class="badge bg-gray">Progresso: ${item.prog}</span>
                ${atrasado            ? '<span class="badge bg-red">⚠️ Atrasado</span>'    : ''}
                ${hoje && !atrasado   ? '<span class="badge bg-amber">📅 Hoje</span>'       : ''}
                ${completo            ? '<span class="badge bg-green">✅ R1-R4 Completo</span>'   : ''}
              </div>
              <div class="etapas">${etapasHTML}</div>
            </div>
          </div>`;
        el.appendChild(card);
      });
    }

    function renderSkeleton() {
      document.getElementById('lista').innerHTML = Array(4).fill(`
        <div class="skel">
          <div class="skel-line" style="height:15px;width:52%"></div>
          <div class="skel-line" style="height:10px;width:32%"></div>
          <div class="skel-line" style="height:24px;width:72%"></div>
        </div>`).join('');
    }

    function renderErro() {
      document.getElementById('lista').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📡</div>
          <div class="empty-txt">Sem ligação e sem cache.<br/>Verifica o URL e o Deploy.</div>
        </div>`;
    }

    function mostrarDebug(msg) {
      const box = document.getElementById('debugBox');
      box.style.display = 'block';
      box.innerHTML = '⚠️ <strong>Diagnóstico:</strong><br/>' + msg.replace(/\n/g,'<br/>');
    }

    async function marcarFeito(id, etapa) {
      alterarStatus(id, etapa, 'Feito');
      toast("✅ Revisão marcada como feita!");
      await enviarStatus(id, etapa, 'marcar');
    }

    async function desfazerRevisao(id, etapa) {
      alterarStatus(id, etapa, 'Pendente');
      toast("↩ Revisão desfeita!");
      await enviarStatus(id, etapa, 'desfazer');
    }

    function alterarStatus(id, etapa, novoStatus) {
      const item = dados.find(d => d.id === id);
      if (!item) return;
      item.rev[etapa].status = novoStatus;
      item.prog = item.rev.slice(0, 4).filter(r => r.status === 'Feito').length + '/4'; // Progresso /4
      salvarCache(dados);
      atualizar();
    }

    async function enviarStatus(id, etapa, action) {
      try {
        await fetch(API_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action, id, etapa })
        });
      } catch { toast("⚠️ Erro ao salvar no servidor"); }
    }

    function abrirSheet() {
      document.getElementById('overlay').classList.add('show');
      setTimeout(() => document.getElementById('inpNome').focus(), 80);
      mostrarPreview();
    }
    function fecharSheet() { document.getElementById('overlay').classList.remove('show'); }
    function fecharBg(e)   { if (e.target === document.getElementById('overlay')) fecharSheet(); }

    function mostrarPreview() {
      const dataVal = document.getElementById('inpData').value;
      const nomeVal = document.getElementById('inpNome').value;
      const box     = document.getElementById('previewBox');
      if (!dataVal || !nomeVal) { box.style.display = 'none'; return; }
      const base = new Date(dataVal + 'T12:00:00');
      [1,7,14,30].forEach((n,i) => {
        document.getElementById('p'+(i+1)).textContent = fmt(addDias(base,n));
      });
      box.style.display = 'block';
    }

    async function salvar() {
      const nome = document.getElementById('inpNome').value.trim();
      const data = document.getElementById('inpData').value;
      if (!nome || !data) { toast("⚠️ Preenche os dois campos!"); return; }

      const btn = document.getElementById('btnSalvar');
      btn.disabled = true; btn.textContent = 'Salvando…';

      try {
        await fetch(API_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: "adicionar", nome, data })
        });
        toast("✅ Enviado! A sincronizar…");
        fecharSheet();
        document.getElementById('inpNome').value = '';
        document.getElementById('inpData').value = hojeISO();
        document.getElementById('previewBox').style.display = 'none';
        setTimeout(() => buscarDados(true), 2000);
      } catch {
        toast("❌ Erro de rede.");
      } finally {
        btn.disabled = false; btn.textContent = 'Salvar';
      }
    }

    function abrirEditar(id) {
      const item = dados.find(d => d.id === id);
      if(!item) return;

      document.getElementById('editId').value = id;
      document.getElementById('editNome').value = item.nome;
      document.getElementById('editDataIni').value = toISO(item.dataIni) || '';
      document.getElementById('editD1').value = toISO(item.rev[0].data) || '';
      document.getElementById('editD2').value = toISO(item.rev[1].data) || '';
      document.getElementById('editD3').value = toISO(item.rev[2].data) || '';
      document.getElementById('editD4').value = toISO(item.rev[3].data) || '';

      document.getElementById('overlayEdit').classList.add('show');
    }

    function fecharSheetEdit() { document.getElementById('overlayEdit').classList.remove('show'); }
    function fecharBgEdit(e)   { if (e.target === document.getElementById('overlayEdit')) fecharSheetEdit(); }

    async function salvarEditar() {
      const id = document.getElementById('editId').value;
      const nome = document.getElementById('editNome').value.trim();
      if(!nome) return toast("⚠️ O nome é obrigatório!");

      const payload = {
        action: 'editar', id, nome,
        dIni: document.getElementById('editDataIni').value,
        d1: document.getElementById('editD1').value,
        d2: document.getElementById('editD2').value,
        d3: document.getElementById('editD3').value,
        d4: document.getElementById('editD4').value
      };

      const item = dados.find(d => d.id === id);
      item.nome = nome;
      item.dataIni = parseData(payload.dIni);
      item.rev[0].data = parseData(payload.d1);
      item.rev[1].data = parseData(payload.d2);
      item.rev[2].data = parseData(payload.d3);
      item.rev[3].data = parseData(payload.d4);
      salvarCache(dados);
      atualizar();

      fecharSheetEdit();
      toast("✅ Guardando alterações...");

      try {
        await fetch(API_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        setTimeout(() => buscarDados(true), 1500);
      } catch (e) { toast("❌ Erro ao Salvar."); }
    }

    async function excluirAssunto() {
      const id = document.getElementById('editId').value;
      if (!confirm("Tem a certeza que deseja excluir este assunto? Esta ação não pode ser desfeita.")) {
        return;
      }

      dados = dados.filter(d => d.id !== id);
      salvarCache(dados);
      atualizar();
      fecharSheetEdit();
      toast("🗑️ Assunto excluído!");

      try {
        await fetch(API_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'excluir', id: id })
        });
        setTimeout(() => buscarDados(true), 1500);
      } catch (e) {
        toast("❌ Erro ao excluir no servidor.");
      }
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }
  </script>
</body>
</html>
